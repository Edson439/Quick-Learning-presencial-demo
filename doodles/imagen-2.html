<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fútbol animado</title>

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
}

svg {
  width: 230px;
  height: auto;
  overflow: visible;
  margin-left: 40px;
  margin-top: 20px;
}

	/* CABEZA */
#cabeza {
  transform-box: view-box;
  transform-origin: 182.72px 80.52px;
  animation: cabezaRotate 3.2s infinite ease-in-out;
}

@keyframes cabezaRotate {
  0%   { transform: rotate(0deg); }
  50%  { transform: rotate(6deg); }
  100% { transform: rotate(0deg); }
}


/* LIBRO */
#libro {
  transform-box: view-box;
  transform-origin: 259.33px 155.4px;
  animation: libroRotate 3s infinite ease-in-out;
}

@keyframes libroRotate {
  0%   { transform: rotate(0deg); }
  50%  { transform: rotate(4deg); }
  100% { transform: rotate(0deg); }
}


/* BOCA HABLANDO */
#boca1,
#boca2 {
  transform-box: fill-box;
  transform-origin: center;
}

#boca1 {
  animation: bocaCerrada 0.45s infinite;
}

#boca2 {
  animation: bocaAbierta 0.45s infinite;
}

@keyframes bocaCerrada {
  0%, 45% { opacity: 1; }
  50%, 100% { opacity: 0; }
}

@keyframes bocaAbierta {
  0%, 45% { opacity: 0; }
  50%, 100% { opacity: 1; }
}
</style>
</head>
