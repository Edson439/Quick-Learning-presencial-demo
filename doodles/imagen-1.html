<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fútbol animado</title>

<style>

/* BASE */
body {
  margin: 0;
  background: transparent; /* 🔥 esto quita el cuadro gris */
  overflow: hidden;
}
	
.wrapper {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;

  transform: scale(0.6); /* 🔥 AJUSTA AQUÍ */
  transform-origin: center;
}

svg {
  width: 100%;
  height: auto;
}

/* CONTENEDOR */
.escena {
  position: relative;
  width: 650px;
  height: 650px;
  margin: 40px auto;
}

/* SVG CHICA */
.escena > svg {
  width: 230px;
  height: auto;
  overflow: visible;
  position: absolute;
  left: 120px;
  top: -20px;
  transform: scaleX(-1);
}

/* 👇 CABEZA (tu animación) */
#cabeza {
  transform-box: view-box;
  transform-origin: 216.3px 78.03px;
  animation: cabezaRotate 3s infinite ease-in-out;
}

@keyframes cabezaRotate {
  0%   { transform: rotate(0deg); }
  50%  { transform: rotate(2deg); }
  100% { transform: rotate(0deg); }
}

/* 👇 PIE (tu animación) */
#pie {
  transform-box: view-box;
  transform-origin: 154px 208px;
  animation: pieRotate 2s infinite ease-in-out;
}

@keyframes pieRotate {
  0%   { transform: rotate(0deg); }
  50%  { transform: rotate(-6deg); }
  100% { transform: rotate(0deg); }
}

/* 👇 ANIMALES */



	
	#boca1,
#boca2 {
  transform-box: fill-box;
  transform-origin: center;
}

/* boca cerrada */
#boca1 {
  animation: bocaCerrada 0.45s infinite;
}

/* boca abierta */
#boca2 {
  animation: bocaAbierta 0.45s infinite;
}

@keyframes bocaCerrada {
  0%, 45% {
    opacity: 1;
  }

  50%, 100% {
    opacity: 0;
  }
}

@keyframes bocaAbierta {
  0%, 45% {
    opacity: 0;
  }

  50%, 100% {
    opacity: 1;
  }
}
	
</style>
</head>
