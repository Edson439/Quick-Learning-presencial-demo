<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
    background:transparent;
    padding:30px;
}

svg{
    width:320px;
    max-width:100%;
    height:auto;
    display:block;
    overflow:visible;
}

#globo1,
#globo2{
    opacity:0;
    transform-box: fill-box;
    transform-origin:center;
    animation: aparecerGlobo 4.05s ease-in-out infinite;
}

#globo1{
    animation-delay:0s;
}

#globo2{
    animation-delay:.45s;
}

@keyframes aparecerGlobo{

    0%{
        opacity:0;
        transform:scale(.55) translateY(18px);
    }

    18%{
        opacity:1;
        transform:scale(1.08) translateY(-4px);
    }

    30%{
        opacity:1;
        transform:scale(1) translateY(0);
    }

    75%{
        opacity:1;
        transform:scale(1) translateY(0);
    }

    100%{
        opacity:0;
        transform:scale(.55) translateY(18px);
    }

}
</style>
</head>
