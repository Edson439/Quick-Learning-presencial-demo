<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
}

.escena{
    width:230px;
    height:420px;
    margin:40px auto;
    overflow:hidden;
    position:relative;
}

svg{
    width:100%;
    height:auto;
    position:absolute;
    bottom:0;
    left:0;
    overflow:visible;
}
	#globo2 {
  opacity: 0;
  transform-box: fill-box;
  transform-origin: center;
  animation: subirBlanco 2.15s infinite linear;
}
#globo1{
    opacity:0;
    transform-box:fill-box;
    transform-origin:center;
    animation: subirAzul 2.15s infinite linear;
	animation-delay: 1.08s;
}
@keyframes subirBlanco {

  0%{
    opacity:0;
    transform:translateY(50px);
  }

  18%{
    opacity:1;
    transform:translateY(32px);
  }

  75%{
    opacity:1;
    transform:translateY(-30px);
  }

  100%{
    opacity:0;
    transform:translateY(-50px);
  }

}

@keyframes subirAzul {

  0%{
    opacity:0;
    transform:translateY(0px);
  }

  18%{
    opacity:1;
    transform:translateY(-18px);
  }

  75%{
    opacity:1;
    transform:translateY(-90px);
  }

  100%{
    opacity:0;
    transform:translateY(-120px);
  }

}
</style>
</head>
