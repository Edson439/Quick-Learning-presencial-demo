<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  background: transparent;
}

.escena{
    width:230px;
    height:420px;
    margin:40px auto;
    overflow:hidden;
    position:relative;
}

svg{
    width:100%;
    height:auto;
    position:absolute;
    bottom:0;
    left:0;
    overflow:visible;
}
#globo1,
#globo1b{
    opacity:0;
    transform-box:fill-box;
    transform-origin:center;
    animation:hablando 3s infinite linear;
	
}

#globo1b{
    animation-delay:1.5s;
}
@keyframes hablando{

  0%{
    opacity:0;
    transform:translateY(0px) scale(.5);
  }

  18%{
    opacity:1;
    transform:translateY(-18px) scale(.5);
  }

  75%{
    opacity:1;
    transform:translateY(-90px) scale(.5);
  }

  100%{
    opacity:0;
    transform:translateY(-120px) scale(.5);
  }

}
	
	
	
</style>
</head>
