<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fútbol animado</title>

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
}

  svg {
    width: 300px;
    height: auto;
    overflow: visible;
  }

/* 👇 CABEZA */
#cabeza {
  transform-box: view-box;
  transform-origin: 131.6989px 126.5457px;
  animation: cabezaRotate 3s infinite ease-in-out;
}

@keyframes cabezaRotate {
  0%   { transform: rotate(0deg); }
  50%  { transform: rotate(4deg); }
  100% { transform: rotate(0deg); }
}


/* 👇 BRAZO */
#braso {
  transform-box: view-box;
  transform-origin: 211.58px 154.95px;
  animation: brasoMove 2s infinite ease-in-out;
}

@keyframes brasoMove {
  0%   { transform: rotate(0deg); }
  50%  { transform: rotate(-6deg); }
  100% { transform: rotate(0deg); }
}


/* 👇 CABELLO */
#cabello {
  transform-box: view-box;
  transform-origin: 96.6725px 157.3786px;
  animation: cabelloMove 3.5s infinite ease-in-out;
}

@keyframes cabelloMove {
  0%   { transform: rotate(0deg); }
  50%  { transform: rotate(3deg); }
  100% { transform: rotate(0deg); }
}
	
	#boca1 {
  animation: bocaCerrada 0.45s infinite;
}

#boca2 {
  animation: bocaAbierta 0.45s infinite;
}

@keyframes bocaCerrada {
  0%, 45% { opacity: 1; }
  50%, 100% { opacity: 0; }
}

@keyframes bocaAbierta {
  0%, 45% { opacity: 0; }
  50%, 100% { opacity: 1; }
}
</style>
</head>
