<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fútbol animado</title>

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
  padding-top: 20px;
}

svg {
  width: 300px;
  height: 400px;
  overflow: visible;
  display: block;
}

/* 👇 CABEZA */

@keyframes cabezaRotate {
  0%   { transform: rotate(0deg); }
  50%  { transform: rotate(2deg); }
  100% { transform: rotate(0deg); }
}


/* 👇 CABEZA */
#cabeza {
  transform-box: view-box;
  transform-origin: 176.9514px 100.6076px;
  animation: cabezaRotate 3s infinite ease-in-out;
}

@keyframes cabezaRotate {
  0%   { transform: rotate(0deg); }
  50%  { transform: rotate(6deg); }
  100% { transform: rotate(0deg); }
}


/* 👇 BRAZO */
#brazo {
  transform-box: view-box;
  transform-origin: 131.1477px 93.4228px;
  animation: brazoMove 2s infinite ease-in-out;
}

@keyframes brazoMove {
  0%   { transform: rotate(0deg); }
  50%  { transform: rotate(-5deg); }
  100% { transform: rotate(0deg); }
}
	/* GLOBO */


/* BOCA HABLANDO */
#boca1,
#boca2 {
  transform-box: fill-box;
  transform-origin: center;
}

#boca1 {
  animation: bocaCerrada 0.45s infinite;
}

#boca2 {
  animation: bocaAbierta 0.45s infinite;
}

@keyframes bocaCerrada {
  0%, 45% { opacity: 1; }
  50%, 100% { opacity: 0; }
}

@keyframes bocaAbierta {
  0%, 45% { opacity: 0; }
  50%, 100% { opacity: 1; }
}
</style>
</head>
